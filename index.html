<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Daily Tracker</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header id="header">
      <button id="btn-prev" class="nav-btn" aria-label="Previous day">&larr;</button>
      <div id="header-date" class="header-date"></div>
      <button id="btn-next" class="nav-btn" aria-label="Next day">&rarr;</button>
    </header>

    <!-- Tabs -->
    <nav id="tabs">
      <button class="tab active" data-tab="checklist">Today</button>
      <button class="tab" data-tab="history">History</button>
      <button class="tab" data-tab="analytics">Analytics</button>
      <button class="tab" data-tab="settings">Settings</button>
    </nav>

    <!-- Checklist View -->
    <main id="view-checklist" class="view active">
      <div id="checklist-items"></div>
      <div id="day-streak" class="day-streak"></div>
    </main>

    <!-- History View -->
    <main id="view-history" class="view">
      <div class="history-filter">
        <div class="filter-row">
          <label>From</label>
          <input type="date" id="filter-from">
        </div>
        <div class="filter-row">
          <label>To</label>
          <input type="date" id="filter-to">
        </div>
      </div>
      <div id="history-list"></div>
    </main>

    <!-- Analytics View -->
    <main id="view-analytics" class="view">
      <div class="analytics-period">
        <button class="period-btn active" data-days="7">7d</button>
        <button class="period-btn" data-days="30">30d</button>
        <button class="period-btn" data-days="90">90d</button>
        <button class="period-btn" data-days="0">All</button>
      </div>
      <div id="analytics-content"></div>
    </main>

    <!-- Settings View -->
    <main id="view-settings" class="view">
      <h2>Checklist Items</h2>
      <div id="settings-items"></div>
      <button id="btn-add-item" class="btn-primary">+ Add Item</button>
      <div id="add-item-form" class="add-form hidden">
        <input type="text" id="new-item-name" placeholder="Item name" autocomplete="off">
        <select id="new-item-type">
          <option value="checkbox">Checkbox (mark as done)</option>
          <option value="text">Text (write a value)</option>
          <option value="bp">Blood Pressure (SYS/DIA/BPM)</option>
        </select>
        <select id="new-item-schedule">
          <option value="daily">Every day</option>
          <option value="weekly">Once a week</option>
        </select>
        <select id="new-item-weekday" class="hidden">
          <option value="0">Sunday</option>
          <option value="1">Monday</option>
          <option value="2">Tuesday</option>
          <option value="3">Wednesday</option>
          <option value="4">Thursday</option>
          <option value="5">Friday</option>
          <option value="6">Saturday</option>
        </select>
        <div class="form-actions">
          <button id="btn-save-item" class="btn-primary">Save</button>
          <button id="btn-cancel-item" class="btn-secondary">Cancel</button>
        </div>
      </div>
      <hr>
      <h2>Data</h2>
      <button id="btn-export" class="btn-secondary">Export Data</button>
      <button id="btn-import" class="btn-secondary">Import Data</button>
      <input type="file" id="import-file" accept=".json" class="hidden">
    </main>
  </div>

  <!-- BP Session modal -->
  <div id="modal-bp" class="modal hidden">
    <div class="modal-content">
      <h3>Add BP Session</h3>
      <div class="bp-modal-time-row">
        <label for="bp-session-time">Time</label>
        <input type="time" id="bp-session-time">
      </div>
      <div class="bp-modal-readings">
        <div class="bp-modal-reading-label">3 readings</div>
        <div class="bp-modal-row">
          <span class="bp-modal-num">1</span>
          <input type="number" class="bp-modal-input bp-r1-sys" placeholder="SYS" min="50" max="300">
          <span class="bp-sep">/</span>
          <input type="number" class="bp-modal-input bp-r1-dia" placeholder="DIA" min="30" max="200">
          <span class="bp-sep">·</span>
          <input type="number" class="bp-modal-input bp-r1-bpm" placeholder="BPM" min="30" max="250">
        </div>
        <div class="bp-modal-row">
          <span class="bp-modal-num">2</span>
          <input type="number" class="bp-modal-input bp-r2-sys" placeholder="SYS" min="50" max="300">
          <span class="bp-sep">/</span>
          <input type="number" class="bp-modal-input bp-r2-dia" placeholder="DIA" min="30" max="200">
          <span class="bp-sep">·</span>
          <input type="number" class="bp-modal-input bp-r2-bpm" placeholder="BPM" min="30" max="250">
        </div>
        <div class="bp-modal-row">
          <span class="bp-modal-num">3</span>
          <input type="number" class="bp-modal-input bp-r3-sys" placeholder="SYS" min="50" max="300">
          <span class="bp-sep">/</span>
          <input type="number" class="bp-modal-input bp-r3-dia" placeholder="DIA" min="30" max="200">
          <span class="bp-sep">·</span>
          <input type="number" class="bp-modal-input bp-r3-bpm" placeholder="BPM" min="30" max="250">
        </div>
      </div>
      <div class="form-actions">
        <button id="btn-bp-save" class="btn-primary">Save</button>
        <button id="btn-bp-cancel" class="btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Edit item modal -->
  <div id="modal-edit" class="modal hidden">
    <div class="modal-content">
      <h3>Edit Item</h3>
      <input type="text" id="edit-item-name" placeholder="Item name">
      <select id="edit-item-type">
        <option value="checkbox">Checkbox</option>
        <option value="text">Text</option>
        <option value="bp">Blood Pressure</option>
      </select>
      <select id="edit-item-schedule">
        <option value="daily">Every day</option>
        <option value="weekly">Once a week</option>
      </select>
      <select id="edit-item-weekday" class="hidden">
        <option value="0">Sunday</option>
        <option value="1">Monday</option>
        <option value="2">Tuesday</option>
        <option value="3">Wednesday</option>
        <option value="4">Thursday</option>
        <option value="5">Friday</option>
        <option value="6">Saturday</option>
      </select>
      <div class="form-actions">
        <button id="btn-edit-save" class="btn-primary">Save</button>
        <button id="btn-edit-delete" class="btn-danger">Delete</button>
        <button id="btn-edit-cancel" class="btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
